name: C/C++ Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libmagickwand-dev pkg-config

    - name: Build with Makefile
      run: |
        make
        if [ ! -f pngslicer ]; then
          echo "ERROR: pngslicer binary not found after make"
          exit 1
        fi
        ls -l pngslicer
        ldd pngslicer

    - name: Setup BATS
      uses: bats-core/bats-action@2.0.0

    - name: Run BATS tests
      run: bats tests/extractions.bats
